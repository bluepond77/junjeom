<script>
        // Micro-interaction for active state scaling on nav items
        const navItems = document.querySelectorAll('nav a');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                navItems.forEach(nav => {
                    nav.classList.remove('text-primary', 'font-bold', 'scale-95');
                    nav.classList.add('text-on-surface-variant');
                    const icon = nav.querySelector('.material-symbols-outlined');
                    if(icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                item.classList.add('text-primary', 'font-bold', 'scale-95');
                item.classList.remove('text-on-surface-variant');
                const icon = item.querySelector('.material-symbols-outlined');
                if(icon) icon.style.fontVariationSettings = "'FILL' 1";
            });
        });

        // Hover effect for cards
        const cards = document.querySelectorAll('.personal-card');
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.classList.add('shadow-md');
            });
            card.addEventListener('mouseleave', () => {
                card.classList.remove('shadow-md');
            });
        });
    </script>
