<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

            outline: none;
            border-color: #006d36 !important;
            box-shadow: 0 0 0 3px rgba(0, 109, 54, 0.1);
        }
    </style>

        "borderRadius": {

        "spacing": {

</head>
<body class="bg-background min-h-screen flex items-center justify-center p-container-padding">
<!-- Login Container -->
<main class="w-full max-w-md animate-fade-in">
<!-- Branding Section -->
<div class="text-center mb-10">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight font-extrabold mb-2">연결</h1>
<p class="font-body-md text-on-surface-variant">모금 전문가를 위한 접점 관리 시스템</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 shadow-[0px_4px_20px_rgba(0,0,0,0.03)]" style="transform: rotateY(0.32deg) rotateX(8.56deg);">
<form class="space-y-6" id="loginForm">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-md text-on-surface" for="email">이메일</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-[44px] pl-10 pr-4 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface transition-all placeholder:text-outline" id="email" name="email" placeholder="example@greenpeace.org" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label-md text-on-surface" for="password">비밀번호</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-[44px] pl-10 pr-4 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-[48px] bg-primary-container text-on-primary-container font-headline-md rounded-lg hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm" type="submit">
<span class="">로그인</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<!-- Security Footer -->
<div class="mt-8 pt-6 border-t border-outline-variant flex flex-col items-center gap-2">
<div class="flex items-center gap-1.5 text-outline">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="font-body-sm text-on-surface-variant">초대된 사용자 전용 보안 네트워크</span>
</div>
<p class="font-body-sm text-outline">© 2024 접점 CRM. All rights reserved.</p>
</div>
</div>
<!-- Decorative Illustration Placeholder -->
<div class="mt-12 opacity-30 grayscale flex justify-center">
<div class="w-32 h-32 bg-contain bg-no-repeat bg-center" data-alt="A minimalist and clean corporate environment with soft, high-key lighting. The scene features a sleek, modern office desk with organized digital tools and a laptop, reflecting a professional fundraising and CRM workflow aesthetic. The color palette is dominated by whites, light grays, and professional navy blues, creating a serene and secure atmosphere." style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCdGwuwYfLQ5UIA9ga6ndZ3GlsQECy_Tag2RUtCSTcOJotOhRk4PMtZOubrwDXPIE4YXJnEidhCRvYxkvRV_lTiT700fshcKVwTISmKX5BBvM9TS2T3g5E7Wemr8MoANhCSHGtVcS4-J5IjiEEcX3EZK3WjXCB7ftB4nfvf9PmZW9QsA6bwXWrSSGw0SIy_3vLKFFDux-OcPuHICq3s68QIFYBURC385kTGSbZU3qnkF6YNKcv2bHXlTeWJGKHk4FYnpDR4987G4H-K");'></div>
</div>
</main>
<script>
        // Micro-interaction for form submission
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            
            // Visual feedback
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            
            setTimeout(() => {
                // Mock redirect
                console.log("Authenticating...");
                btn.innerHTML = '인증 성공';
                btn.classList.replace('bg-primary-container', 'bg-primary');
                btn.classList.replace('text-on-primary-container', 'text-on-primary');
            }, 1200);
        });

        // Add a subtle parallax effect to the card
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.bg-surface-container-lowest');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 80;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 80;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
    </script>
<style>
        /* Fade in animation for the main content */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Perspective for the card tilt */
        main {
            perspective: 1200px;
        }
        .bg-surface-container-lowest {
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }
    </style>
</body></html>
