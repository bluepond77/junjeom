<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>개인미팅 상세/작성 - 접점</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #bbcbbb;
            border-radius: 10px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f8f9ff",
                        "inverse-primary": "#49e182",
                        "on-error": "#ffffff",
                        "primary-container": "#2dcc70",
                        "on-secondary-container": "#4c6860",
                        "on-primary": "#ffffff",
                        "surface": "#f8f9ff",
                        "on-tertiary-fixed-variant": "#424846",
                        "on-secondary-fixed": "#04201a",
                        "error-container": "#ffdad6",
                        "surface-tint": "#006d36",
                        "inverse-surface": "#213145",
                        "on-error-container": "#93000a",
                        "surface-dim": "#cbdbf5",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#005227",
                        "surface-bright": "#f8f9ff",
                        "error": "#ba1a1a",
                        "outline-variant": "#bbcbbb",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#d3e4fe",
                        "primary": "#006d36",
                        "secondary": "#48645c",
                        "surface-container": "#e5eeff",
                        "on-primary-fixed": "#00210c",
                        "tertiary": "#5a605d",
                        "on-primary-container": "#005026",
                        "on-tertiary-container": "#414644",
                        "secondary-container": "#c8e6dc",
                        "on-surface-variant": "#3d4a3e",
                        "primary-fixed-dim": "#49e182",
                        "surface-container-low": "#eff4ff",
                        "on-background": "#0b1c30",
                        "secondary-fixed": "#cbe9df",
                        "secondary-fixed-dim": "#afcdc3",
                        "primary-fixed": "#6afe9b",
                        "surface-container-high": "#dce9ff",
                        "tertiary-fixed-dim": "#c2c8c5",
                        "on-secondary-fixed-variant": "#314c44",
                        "on-tertiary-fixed": "#171d1b",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "tertiary-fixed": "#dee4e1",
                        "outline": "#6c7b6d",
                        "on-surface": "#0b1c30",
                        "tertiary-container": "#afb4b1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "xs": "4px",
                        "margin-mobile": "16px",
                        "md": "16px",
                        "gutter": "24px",
                        "lg": "24px",
                        "margin-desktop": "32px",
                        "base": "4px",
                        "xl": "40px"
                    },
                    "fontFamily": {
                        "body-md": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "display-lg-mobile": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "body-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "60px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "display-lg-mobile": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],

                }
            }
        }

<style>
        body {
            min-height: max(884px, 100dvh);
        }
        input, select, textarea {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-4 h-14 w-full fixed top-0 z-50 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-3">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container transition-colors" onclick="history.back()">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-headline-md font-semibold text-on-surface">이친구 님</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface">more_vert</span>
</button>
</div>
</header>
<!-- Content Canvas -->
<main class="pt-20 px-4 max-w-2xl mx-auto space-y-4">
<!-- Section: 기본 정보 -->
<section class="bg-surface-container-lowest p-5 rounded-lg border border-outline-variant shadow-sm space-y-4">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[20px]">info</span>
<h2 class="text-label-md font-bold uppercase tracking-wider">기본 정보</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-label-md text-on-surface-variant font-medium ml-1">일시</label>
<div class="relative">
<input class="w-full h-11 px-3 bg-surface-container-low border border-outline-variant rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-body-md" type="datetime-local" value="2024-05-24T14:30"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-label-md text-on-surface-variant font-medium ml-1">대상자</label>
<input class="w-full h-11 px-3 bg-surface-container-low border border-outline-variant rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-body-md" placeholder="이름 입력" type="text" value="이친구"/>
</div>
</div>
</section>
<!-- Section: 가족관계 -->
<section class="bg-surface-container-lowest p-5 rounded-lg border border-outline-variant shadow-sm space-y-4">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[20px]">family_history</span>
<h2 class="text-label-md font-bold uppercase tracking-wider">가족관계</h2>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-label-md text-on-surface-variant font-medium ml-1">배우자 이름</label>
<input class="w-full h-11 px-3 bg-surface-container-low border border-outline-variant rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-body-md" placeholder="미입력" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-label-md text-on-surface-variant font-medium ml-1">자녀 이름</label>
<input class="w-full h-11 px-3 bg-surface-container-low border border-outline-variant rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-body-md" placeholder="자녀들 이름" type="text"/>
</div>
</div>
</section>
<!-- Section: 기타 정보 -->
<section class="bg-surface-container-lowest p-5 rounded-lg border border-outline-variant shadow-sm space-y-4">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[20px]">bubble_chart</span>
<h2 class="text-label-md font-bold uppercase tracking-wider">기타 정보</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="space-y-1.5">
<label class="text-label-md text-on-surface-variant font-medium ml-1">생일</label>
<input class="w-full h-11 px-3 bg-surface-container-low border border-outline-variant rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-body-md" type="date"/>
</div>
<div class="space-y-1.5">
<label class="text-label-md text-on-surface-variant font-medium ml-1">세례명</label>
<input class="w-full h-11 px-3 bg-surface-container-low border border-outline-variant rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-body-md" placeholder="세례명 입력" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-label-md text-on-surface-variant font-medium ml-1">종교</label>
<select class="w-full h-11 px-3 bg-surface-container-low border border-outline-variant rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-body-md">
<option>기독교</option>
<option>천주교</option>
<option>불교</option>
<option>무교</option>
<option>기타</option>
</select>
</div>
</div>
</section>
<!-- Section: 상세 로그 -->
<section class="space-y-3">
<div class="flex items-center gap-2 text-primary px-1">
<span class="material-symbols-outlined text-[20px]">sticky_note_2</span>
<h2 class="text-label-md font-bold uppercase tracking-wider">상세 로그</h2>
</div>
<div class="grid grid-cols-1 gap-3">
<div class="bg-surface-container-lowest p-5 rounded-lg border border-outline-variant shadow-sm hover:border-primary/50 transition-colors">
<label class="block text-label-md text-primary font-bold mb-3 uppercase tracking-wide">건강이슈</label>
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-md min-h-[80px] resize-none custom-scrollbar" placeholder="최근 건강 상태나 유의사항을 기록하세요..." rows="3"></textarea>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-3">
<div class="bg-surface-container-lowest p-5 rounded-lg border border-outline-variant shadow-sm hover:border-primary/50 transition-colors">
<label class="block text-label-md text-secondary font-bold mb-3 uppercase tracking-wide">최근 기쁜 일</label>
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-md min-h-[100px] resize-none custom-scrollbar" placeholder="축하할 만한 최근 소식..." rows="4"></textarea>
</div>
<div class="bg-surface-container-lowest p-5 rounded-lg border border-outline-variant shadow-sm hover:border-primary/50 transition-colors">
<label class="block text-label-md text-tertiary font-bold mb-3 uppercase tracking-wide">중요 가치/말</label>
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 text-body-md min-h-[100px] resize-none custom-scrollbar" placeholder="대화 중 강조한 생각이나 가치관..." rows="4"></textarea>
</div>
</div>
</div>
</section>
<!-- Section: 후속작업 -->
<section class="bg-secondary-container/20 p-5 rounded-lg border border-secondary/20 shadow-sm space-y-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-[20px]">task_alt</span>
<h2 class="text-label-md font-bold uppercase tracking-wider">후속작업</h2>
</div>
<div class="flex items-center gap-2">
<span class="text-label-md text-on-surface-variant font-medium">캘린더에 자동 등록</span>
<button class="relative inline-flex h-6 w-11 items-center rounded-full bg-outline-variant transition-colors focus:outline-none" id="calendarToggle" onclick="toggleCalendar(this)">
<span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1"></span>
</button>
</div>
</div>
<div class="relative">
<input class="w-full h-11 pl-10 pr-3 bg-surface-container-low border border-outline-variant rounded-DEFAULT focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none text-body-md" placeholder="다음 방문이나 연락 예정 업무 입력" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">add_task</span>
</div>
</section>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 w-full bg-surface border-t border-outline-variant p-4 z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full h-12 bg-primary text-on-primary font-bold rounded-lg hover:brightness-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/10">
<span class="material-symbols-outlined">save</span>
                저장하기
            </button>
</div>
</footer>
<script>
        // Form field focus effects for containers
        const containers = document.querySelectorAll('section > div.bg-surface-container-lowest, section > div.bg-transparent');
        const textareas = document.querySelectorAll('textarea');
        
        textareas.forEach(ta => {
            ta.addEventListener('focus', () => {
                ta.parentElement.classList.add('ring-2', 'ring-primary/10', 'border-primary');
            });
            ta.addEventListener('blur', () => {
                ta.parentElement.classList.remove('ring-2', 'ring-primary/10', 'border-primary');
            });
        });

        // Initialize Toggle State (Active by default)
        const toggle = document.getElementById('calendarToggle');
        toggle.classList.add('bg-primary');
        toggle.querySelector('span').classList.add('translate-x-5');

        function toggleCalendar(btn) {
            btn.classList.toggle('bg-primary');
            btn.classList.toggle('bg-outline-variant');
            const span = btn.querySelector('span');
            span.classList.toggle('translate-x-5');
            span.classList.toggle('translate-x-1');
        }
    </script>
</body></html>
